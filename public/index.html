<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test</title>

    <style>
        body {
            font-family: sans-serif;
            padding: 40px;
            background: #f5f5f5;
            color: #222;
        }

        button {
            padding: 10px 20px;
            font-size: 14px;
            cursor: pointer;
            background: #2563eb;
            color: #fff;
            border: none;
            border-radius: 6px;
        }

        button:hover {
            background: #1d4ed8;
        }

        ul {
            margin-top: 16px;
            padding: 0;
            list-style: none;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        li {
            padding: 12px 16px;
            border-bottom: 1px solid #f0f0f0;
        }

        li:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    Hello, world!
    <button onclick="loadUsers()">Получить список пользователей</button>

    <ul id="users-list"></ul>

    <script>
        async function loadUsers() {
            const result = await fetch('http://localhost:5050/api/v1/users')
            const users = await result.json()

            const list = document.getElementById('users-list')
            list.innerHTML = users.map(user => `<li>ID: ${user.id} - FullName: ${user.full_name}</li>`).join('')
        }
    </script>
</body>
</html>
